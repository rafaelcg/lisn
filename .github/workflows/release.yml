name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build and upload assets for"
        required: true
        type: string

jobs:
  prepare_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.resolve_tag.outputs.tag }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Resolve tag
        id: resolve_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.resolve_tag.outputs.tag }}
        run: |
          if gh release view "$TAG" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            exit 0
          fi

          if [[ "$TAG" == *-* ]]; then
            gh release create "$TAG" \
              --repo "${GITHUB_REPOSITORY}" \
              --draft \
              --prerelease \
              --title "$TAG" \
              --notes-file CHANGELOG.md
          else
            gh release create "$TAG" \
              --repo "${GITHUB_REPOSITORY}" \
              --draft \
              --title "$TAG" \
              --notes-file CHANGELOG.md
          fi

  build_macos:
    needs: prepare_release
    runs-on: macos-15
    permissions:
      contents: write
    env:
      APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD || github.run_id }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare_release.outputs.tag }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules
        run: npm rebuild better-sqlite3

      - name: Validate Apple signing secrets
        run: |
          missing=0
          for name in APPLE_CERTIFICATE_P12_BASE64 APPLE_CERTIFICATE_PASSWORD APPLE_TEAM_ID APPLE_API_KEY APPLE_API_KEY_ID APPLE_API_ISSUER; do
            if [ -z "${!name}" ]; then
              echo "Missing required secret: $name"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Import Apple signing certificate
        if: env.APPLE_CERTIFICATE_P12_BASE64 != ''
        env:
          KEYCHAIN_PATH: ${{ runner.temp }}/app-signing.keychain-db
        run: |
          echo "$APPLE_CERTIFICATE_P12_BASE64" | base64 -D > "$RUNNER_TEMP/certificate.p12"
          security create-keychain -p "$APPLE_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$APPLE_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/certificate.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$APPLE_KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | sed -n 's/.*\"\\(Developer ID Application:.*\\)\"/\\1/p' | head -n 1)"
          if [ -z "$IDENTITY" ]; then
            echo "No Developer ID Application identity found in imported certificate."
            security find-identity -v -p codesigning "$KEYCHAIN_PATH"
            exit 1
          fi

          echo "APPLE_SIGNING_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "APPLE_KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Write App Store Connect API key
        if: env.APPLE_API_KEY != ''
        run: |
          printf '%s' "$APPLE_API_KEY" > "$RUNNER_TEMP/AuthKey.p8"
          echo "APPLE_API_KEY_PATH=$RUNNER_TEMP/AuthKey.p8" >> "$GITHUB_ENV"

      - name: Stage macOS helper
        run: bash ./scripts/stage-macos-helper.sh

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build release artifacts
        run: npm run make -- --arch=arm64

      - name: Verify signed app bundle
        run: |
          APP_PATH="$(find out -type d -name 'Lisn.app' | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "Signed app bundle not found."
            exit 1
          fi

          codesign --verify --deep --strict --verbose=4 "$APP_PATH"
          xcrun stapler validate "$APP_PATH"

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare_release.outputs.tag }}
        run: |
          find out/make -type f \( -name '*.dmg' -o -name '*.zip' \) | sort > release-assets.txt

          if [ ! -s release-assets.txt ]; then
            echo "No release assets were produced."
            exit 1
          fi

          while IFS= read -r asset; do
            gh release upload "$TAG" "$asset" --repo "${GITHUB_REPOSITORY}" --clobber
          done < release-assets.txt
